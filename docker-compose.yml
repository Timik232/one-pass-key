services:
  app:
    build: .
    ports:
      - "3080:3000"
    volumes:
      - secret-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/secrets.db
      - CORS_ORIGINS=/^https:\/\/.*\.komolov\.synology\.me$/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/secrets/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

volumes:
  secret-data:
